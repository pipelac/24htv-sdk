components:
  schemas:
    Account:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          title: ID аккаунта
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
          title: Стоимость
        is_payment_allowed:
          type: boolean
          readOnly: true
          title: платеж разрешен
      required:
      - id
      - is_payment_allowed
    AudioStream:
      type: object
      properties:
        codec:
          type: string
          title: Кодек
        language:
          type: string
          title: Язык
        bitrate:
          type: integer
          title: Битрейт
