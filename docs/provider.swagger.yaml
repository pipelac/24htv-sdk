  /v2/channels/{id}/stream:
    get:
      operationId: channels_stream_retrieve
      description: |-
        Метод позволяет получить поток канала.

        В качестве параметров могут быть переданы:
          - тип (протокол) потока ("hls" (default), "local", "local_low", "http", "http_low", "config", "multicast")
          - timestamp начала потока (ts=0 (default) - прямой эфир)
          - сделать ли запись в историю просмотра (history=true)
          - идентификатор видеопотока (video_num=1). Если протокол позволяет (например HLS, DASH) -
            можно запросить несколько потоков
          - идентификатор аудиопотока (audio_num=2). Если протокол позволяет (например HLS, DASH) -
            можно запросить несколько потоков
      summary: Получение потока для канала
      parameters:
      - in: query
        name: access_token
        schema:
          type: string
          minLength: 1
      - in: query
        name: audio_num
        schema:
          type: string
          nullable: true
          minLength: 1
      - in: query
        name: disable_stat
        schema:
          type: boolean
          default: false
      - in: query
        name: force_https
        schema:
          type: boolean
          default: false
      - in: query
        name: format
        schema:
          type: string
          enum:
          - json
          - xml
      - in: query
        name: history
        schema:
          type: boolean
          default: true
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this channel.
        required: true
      - in: query
        name: library_id
        schema:
          type: integer
          minimum: 1
          title: Библиотека
      - in: query
        name: preview
        schema:
          type: boolean
          default: false
      - in: query
        name: remote
        schema:
          type: string
          title: Remote IP
          minLength: 1
      - in: query
        name: seek_ts
        schema:
          type: integer
      - in: query
        name: ts
        schema:
          type: integer
          default: 0
      - in: query
        name: type
        schema:
          type: string
          default: hls
          minLength: 1
      - in: query
        name: video_num
        schema:
          type: string
          nullable: true
          minLength: 1
      tags:
      - channels
      security:
      - userAccessTokenHeader: []
      - userAccessToken: []
      - providerTokenAuthentication: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
            application/xml:
              schema:
                type: object
                additionalProperties: {}
          description: ''
