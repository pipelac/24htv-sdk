        В качестве дополнительных параметров фильтрации могут быть использованы: start, end.
        Расписание вернётся не дальше архива канала.
      summary: Получение расписания контента на канале
      parameters:
      - in: query
        name: channels_version
        schema:
          type: integer
      - in: query
        name: date
        schema:
          type: string
          format: date
      - in: query
        name: end
        schema:
          type: integer
      - in: query
        name: format
        schema:
          type: string
          enum:
          - json
          - xml
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this channel.
        required: true
      - in: query
        name: limit
        schema:
          type: integer
          maximum: 100
          minimum: 1
          title: Лимит
      - in: query
        name: offset
        schema:
          type: integer
          minimum: 0
      - in: query
        name: start
        schema:
          type: integer
      tags:
      - channels
      security:
      - userAccessTokenHeader: []
      - userAccessToken: []
      - providerTokenAuthentication: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShortContentSchedule'
            application/xml:
              schema:
                $ref: '#/components/schemas/ShortContentSchedule'
          description: ''
