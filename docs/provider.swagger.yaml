        schema:
          type: integer
      - in: query
        name: date
        schema:
          type: string
          format: date
      - in: query
        name: end
        schema:
          type: integer
      - in: query
        name: format
        schema:
          type: string
          enum:
          - json
          - xml
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this channel.
        required: true
      - in: query
        name: limit
        schema:
