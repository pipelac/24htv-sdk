  /v2/users:
    get:
      operationId: users_list
      description: |-
        Данный метод используется для получения списка пользователей.

        Если указан параметр subscription, то к информации о пользователе добавляется список его
        подписок с указанным subscriptions.

        Параметр subscriptions принимает:
          - all - все подписки
          - current - текущие (с учетом стоящих на паузе)
          - active - только активные (без учета стоящих на паузе)
          - paused - только стоящих на паузе
          - planned - только подключенные в будущем подписки (уже назначенные, не запланированные)
          - period - подключенные за период с date_from по date_to

        Если указан параметр all_providers, то ограничение происходит по провайдерам, доступным через модель
        StaffAllowProviders
      summary: Получение списка пользователей
      parameters:
      - in: query
        name: date_from
        schema:
          type: string
          format: date-time
          title: 'Подписки с даты '
      - in: query
        name: date_to
        schema:
          type: string
          format: date-time
          title: Подписки по дату
      - in: query
        name: email
        schema:
          type: string
          title: Get by email
          minLength: 1
      - in: query
        name: format
        schema:
          type: string
          enum:
          - dune_plugin
          - json
          - xml
      - in: query
        name: limit
        schema:
          type: integer
          maximum: 100
          minimum: 1
          title: Лимит
      - in: query
        name: offset
        schema:
          type: integer
          minimum: 0
      - in: query
        name: phone
        schema:
          type: string
          title: Get by phone
          minLength: 1
      - in: query
        name: provider_uid
        schema:
          type: string
          title: Get by provider_uid
          minLength: 1
      - in: query
        name: search
        schema:
          type: string
          title: Search string
          minLength: 1
      - in: query
        name: subscriptions
        schema:
          type: string
          title: Подписки
          minLength: 1
      - in: query
        name: tags
        schema:
          type: string
          title: Users tags
          minLength: 1
      - in: query
        name: username
        schema:
          type: string
          title: Get by username
          minLength: 1
      tags:
      - users
      security:
      - userAccessTokenHeader: []
      - userAccessToken: []
      - providerTokenAuthentication: []
