  /v2/users/{user_id}/subscriptions:
    get:
      operationId: users_subscriptions_list
      description: |-
        Получение списка подписок на пакеты пользователя

        Параметры:
          - includes - позволяет включить в информацию о подписках дополнительные параметры
            - packet.channels - каналы в пакете подписки
            - packet.videos - все источники видео пакете подписки
            - packet.available - разрешенные для подключения дополнительные пакеты
            - packet.includes - включенные в пакет дополнительные пакеты
          - types - фильтр подписок
            - active - выводить только активные (без учета стоящих на паузе)
            - current - выводить текущие подписки (c учетом подписок на паузе)
            - paused - выводить подписки на паузе
            - planned - выводить только подключенные в будущем подписки (уже назначенные, не запланированные)
          - packet_ids - вывод подписок по списку id пакетов
      summary: Получение списка подписок на пакеты пользователя
      parameters:
      - in: query
        name: format
        schema:
          type: string
          enum:
          - dune_plugin
          - json
          - xml
      - in: query
        name: includes
        schema:
          type: string
          minLength: 1
      - in: query
        name: packet_ids
        schema:
          type: string
          title: Packets ids
          minLength: 1
      - in: query
        name: types
        schema:
          type: string
          minLength: 1
      - in: path
        name: user_id
        schema:
          type: string
          pattern: ^[0-9]+$
        required: true
      - in: query
        name: version
        schema:
          type: string
          title: Версия
          minLength: 1
      tags:
      - users
      security:
      - providerTokenAuthentication: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
