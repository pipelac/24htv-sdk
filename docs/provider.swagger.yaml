openapi: 3.0.3
info:
  title: 24tv Описание провайдерского API
  version: v2
  description: "\nВ данном документе описаны только те методы API которые доступны\
    \ по токену провайдера.\n\n<a href=\"/v2/doc/provider\">Swagger provider API</a>\
    \ |\n<a href=\"/v2/doc/provider/redoc\">Redoc provider API</a> |\n<a href=\"/v2/doc/provider/old-swagger\"\
    >Swagger provider API- устаревшая версия</a>\n\n## Schema\nВсе методы доступнны\
    \ только через HTTPS.\n\n## Methods\nДля взаимодействия с API используются методы\
    \ GET, POST, PUT, DELETE, PATCH.\nМетоды используются в соответствии со своим\
    \ назначением по HTTP RFC\n- GET - получение объекта\n- POST - создание\n- PUT\
    \ - модификация\n- DELETE - удаление\n- PATCH - частичная модификация\n\n## Limits\n\
    - Для общения с API вам потребуется авторизационный токен (token). Его можно\n\
    сгенерировать в интерфейсе администратора.\n- token обладает ограничениями по\
    \ количеству вызовов с секунду, час и сутки.\nБудьте дружелюбными.\n- при выводе\
    \ большого списка используется постраничный вывод.\nДля получения всего списка\
    \ следует использовать &limit= и &offset=\n        "
paths:
  /v2/auth/provider:
    post:
      operationId: auth_provider_create
      description: |-
        Это способ аутентификации пользователя с помощью токена провайдера.
        Метод создает объект Token и возвращает его в случае успеха.
        Token используется для доступа к методам требующим пользовательской аутентификации.

        В качестве входных параметров используется:
          - user_id - идентификатор пользователя
          - username - юзернэйм пользователя
          - phone - телефон пользователя
          - all_providers - признак изменения ограничения по провайдерам; если равен True, ограничение происходит
          по провайдерам, доступным через модель StaffAllowProviders

        Возвращается сессионный токен:
          - access_token - Токен, используемый для аутентификации запросов текущей сессии.
          - expires - Время когда токен перестанет быть действительным.
      summary: Получение токена доступа по идентификатору пользователя
      parameters:
      - in: query
        name: format
        schema:
          type: string
          enum:
          - dune_plugin
          - json
          - xml
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProviderAuthSwagger'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ProviderAuthSwagger'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProviderAuthSwagger'
      security:
      - providerTokenAuthentication: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
            application/xml:
              schema:
                $ref: '#/components/schemas/Token'
          description: ''
  /v2/channels:
    get:
      operationId: channels_list
      description: |-
        Получение списка всех доступных каналов.

        Параметры:
          - includes - позволяет включить в информацию о канале
              - images.blackback - логотипы для черного фона
              - images.whiteback - логотипы для белого фона
      summary: Получение списка всех доступных каналов
      parameters:
      - in: query
        name: channels_order
        schema:
          type: string
          title: Order channels
          minLength: 1
      - in: query
        name: channels_version
        schema:
          type: integer
          default: 1
      - in: query
        name: format
        schema:
          type: string
          enum:
          - json
          - xml
      - in: query
        name: includes
        schema:
          type: string
          minLength: 1
      - in: query
        name: limit
        schema:
          type: integer
          maximum: 100
          minimum: 1
          title: Лимит
      - in: query
        name: offset
        schema:
          type: integer
          minimum: 0
      - in: query
        name: order
        schema:
          type: string
          title: Order field
          minLength: 1
      - in: query
        name: search
        schema:
          type: string
          title: Search string
          minLength: 1
      tags:
      - channels
      security:
      - userAccessTokenHeader: []
      - userAccessToken: []
      - providerTokenAuthentication: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChannelListV2'
            application/xml:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChannelListV2'
          description: ''
